<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>casa:hacker - Loading Screen</title>
    <style>
        /* Estilos Globais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden; /* Evita rolagem horizontal por causa do pulso */
        }

        /* Cabeçalho (Header) */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            border-bottom: 1px solid #eaeaea;
            position: relative;
            z-index: 20;
            background: #fff;
        }

        .logo-casa-hacker {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-casa-hacker::after {
            content: "⚛";
            color: #32FA96;
            font-size: 26px;
            font-weight: normal;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: #000000;
            font-size: 15px;
            font-weight: 600;
        }

        .btn-login {
            border: 1px solid #000;
            padding: 8px 20px;
            border-radius: 6px;
        }

        .btn-donate {
            border: 1px solid #000;
            padding: 8px 20px;
            border-radius: 6px;
        }

        /* Área Central (Wheel) */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 50px 20px;
            position: relative;
        }

        /* O Círculo Preto Principal */
        .wheel-container {
            position: relative;
            width: 520px;
            height: 520px;
            border-radius: 50%;
            border: 3px solid #000000;
            background-color: #ffffff;
            z-index: 5;
        }

        /* Linhas divisórias (Raios) cruzando o círculo */
        .spoke {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background-color: #000000;
            transform-origin: center;
            margin-left: -1px;
            z-index: 1;
        }
        .spoke:nth-child(1) { transform: rotate(0deg); }
        .spoke:nth-child(2) { transform: rotate(30deg); }
        .spoke:nth-child(3) { transform: rotate(60deg); }
        .spoke:nth-child(4) { transform: rotate(90deg); }
        .spoke:nth-child(5) { transform: rotate(120deg); }
        .spoke:nth-child(6) { transform: rotate(150deg); }

        /* Centro Escuro com Átomo Verde */
        .center-hub {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 130px;
            height: 130px;
            margin-top: -65px;
            margin-left: -65px;
            background-color: #0b1a13;
            border-radius: 50%;
            border: 3px solid #32FA96;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 15;
            box-shadow: inset 0 0 25px rgba(50, 250, 150, 0.4), 0 0 30px rgba(50, 250, 150, 0.6);
        }

        .center-hub::before {
            content: "⚛";
            font-size: 70px;
            color: #32FA96;
            text-shadow: 0 0 20px #32FA96;
        }

        /* Efeito de Pulso Verde Vazando para fora da roda */
        .pulse-wave {
            position: absolute;
            top: 43%;
            left: 50%;
            width: 130px;
            height: 130px;
            margin-top: -65px;
            margin-left: -65px;
            border-radius: 50%;
            border: 2px solid #32FA96;
            box-shadow: 0 0 15px #32FA96;
            z-index: 10;
            animation: ripple 4s infinite cubic-bezier(0.1, 0.5, 0.5, 1);
            pointer-events: none;
        }

        .pulse-wave:nth-child(2) { animation-delay: 1s; }
        .pulse-wave:nth-child(3) { animation-delay: 2s; }
        .pulse-wave:nth-child(4) { animation-delay: 3s; }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(5); opacity: 0; } /* Scale 5 faz o pulso chegar a 650px, saindo do círculo preto (520px) */
        }

        /* Posicionamento Matemático dos Logos:
           i*30deg rotaciona para a fatia.
           O +15deg empurra perfeitamente para o meio de duas linhas.
        */
        .logo-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 30px;
            margin-top: -15px;
            margin-left: -35px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            /* O translateY(-190px) define a distância do centro */
            transform: rotate(calc((var(--i) * 30deg) + 15deg)) translateY(-190px) rotate(calc((var(--i) * -30deg) - 15deg));
        }

        /* ESTILO DO PLACEHOLDER (Para mostrar o alinhamento perfeito) */
        .logo-placeholder {
            width: 100%;
            height: 100%;
            background-color: #f9f9f9;
            border: 1px dashed #bbb;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            font-weight: bold;
            color: #666;
            text-align: center;
            padding: 5px;
        }

        /* Regra para as suas imagens (oculto até você usar a tag img) */
        .logo-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Barra de Progresso */
        .progress-section {
            margin-top: 80px;
            width: 600px;
            z-index: 20;
        }

        .progress-bar {
            width: 100%;
            height: 16px;
            background-color: #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
        }

        .progress-fill {
            width: 85%;
            height: 100%;
            background: linear-gradient(90deg, #7b2cbf 0%, #3a0ca3 20%, #4361ee 40%, #32FA96 60%, #f77f00 80%, #d62828 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 12px;
        }

        .progress-text {
            color: #ffffff;
            font-size: 11px;
            font-weight: bold;
        }

        /* Rodapé (Footer) */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 30px 50px;
            background: #fff;
            position: relative;
            z-index: 20;
        }

        .footer-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .footer-links a {
            text-decoration: none;
            color: #000000;
            font-size: 15px;
        }

        .footer-right {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        .egoi-card {
            background-color: #f0f4f8;
            padding: 10px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: bold;
            color: #1a4f66;
            font-size: 15px;
        }

        .egoi-card span { font-size: 24px; }
        .tagline { font-size: 14px; color: #555; margin-top: 5px;}
    </style>
</head>
